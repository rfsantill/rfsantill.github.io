# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.

# Main Page Setup

title: Rene Santillana's Portfolio # This is what shows up in the tab of the browser



# Hero Section
name: Rene F. Santillana, EIT
headline: Welcome to my portfolio!
description: >- # dont remove this line. this will ignore all new lines until the next section
  I am a passionate mechanical engineer with a background in scientific instrumentation, aerospace systems, and advanced engineering research, focused on developing innovative mechanical solutions for complex environments. Experienced in concept development, detailed design, and system-level validation, including structural, thermal, and environmental analysis.

  I have led and supported multidisciplinary efforts to design, prototype, and test hardware under demanding conditions, while collaborating with customers, vendors, and internal teams to deliver high-performance solutions.

  My goal is to bridge innovation and execution, bringing new ideas from concept to reliable, manufacturable products.

# Place your profile image in /assets/images/profile-image/folder and edit the file name
profile_image: /assets/images/profile-image/ReneProfile.jpg


# Link your resume
# You can place your resume in assets/resume/{resume.pdf or add external link such as pdf saved in google drive 
resume-url: /assets/resume/Rene-Santillana-Resume_2026.pdf


# Set up external links - this will show up as small icons next to your name.

external-links:    # input only your own url slug. The icons with missing entries will not appear.
  linkedin: rene-santillana  # https://www.linkedin.com/in/{your url slug} 
  github:     # https://github.com/{your url slug} 
  stackoverflow:       # https://stackoverflow.com/users/{your url slug}
  medium:            # https://medium.com/@{your url slug} 
  x-twitter:   # https://x.com/{your url slug} 
  threads:            # https://threads.net/@{your url slug} 
  instragram:       # https://instagram.com/{your url slug} 
  youtube:           # https://youtube.com/@{your url slug} 
  discord:            # https://discord.com/users/{your url slug} 
  bluesky:           # https://bsky.app/profile/{your url slug} 
  

